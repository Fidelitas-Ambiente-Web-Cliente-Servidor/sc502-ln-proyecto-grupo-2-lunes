<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Abraza | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="css/style_proyecto.css" />
    <script src="js/publico.js"></script>
</head>

<body>
    <header class="header" id="inicio">
        <div class="container header-container">
            <div class="brand">
                <img src="img/logo.jpeg" alt="Logo Abraza" class="logo">
                <div class="texto-marca">
                    <h1>Abraza</h1>
                    <p>Refugio y adopción responsable</p>
                </div>
            </div>

            <nav class="menu-principal">
                <a href="index.html">Inicio</a>
                <a href="sobre.html">Sobre el Refugio</a>
                <a href="animales.html">Animales</a>
                <a href="citas.html">Citas</a>
                <a href="consejos.html">Consejos</a>
                <a href="donaciones.html">Donaciones</a>
                <a href="contacto.html">Contacto</a>
                <a href="login.html" class="boton-login-menu">Login</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="seccion">
            <div class="container">
                <h2 class="titulo-seccion">Sign in</h2>
                <p class="subtitulo-seccion">
                    Ingresá tus datos para acceder al sistema.
                </p>

                <div class="login-contenedor">
                    <div class="login-formulario">
                        <form action="#" method="post">
                            <div class="mb-3">
                                <label for="usuarioLogin" class="form-label">Usuario o correo</label>
                                <input type="text" class="form-control" id="usuarioLogin"
                                    placeholder="Digite su usuario o correo">
                            </div>

                            <div class="mb-3">
                                <label for="claveLogin" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="claveLogin"
                                    placeholder="Digite su contraseña">
                            </div>

                            <p class="texto-login">
                                <a href="#">Olvidé mi contraseña</a>
                            </p>

                            <div class="botones-login-demo">
                                <a href="perfil.html" class="btn boton-principal">Ingresar como usuario</a>
                                <a href="dashboard.html" class="btn boton-secundario">Ingresar como
                                    administrador</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-contenido">
            <p>© <span id="year"></span> Abraza - Adopción responsable</p>
            <a href="#inicio">Volver arriba</a>
        </div>
    </footer>
</body>

</html>
